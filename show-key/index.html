<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Display</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #key-display {
            font-size: 200px;
            font-weight: bold;
            color: #FFD700;
            position: absolute;
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }

        #key-display.show {
            opacity: 1;
            transition: none;
        }

        #key-display.fade-out {
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="key-display"></div>

    <script>
        const keyDisplay = document.getElementById('key-display');
        let fadeTimeout;

        document.addEventListener('keydown', (event) => {
            // Prevent default browser behavior
            event.preventDefault();

            // Clear any existing fade timeout
            clearTimeout(fadeTimeout);

            // Remove fade-out class and add show class to display immediately
            keyDisplay.classList.remove('fade-out');
            keyDisplay.classList.add('show');

            // Get the key pressed (show the character, not the key name)
            const key = event.key;
            keyDisplay.textContent = key;

            // Fade out after 500ms
            fadeTimeout = setTimeout(() => {
                keyDisplay.classList.remove('show');
                keyDisplay.classList.add('fade-out');
            }, 500);
        });
    </script>
</body>
</html>
