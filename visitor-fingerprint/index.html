<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Fingerprint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="info-row">
            <div class="label">User Agent:</div>
            <div class="value" id="user-agent">Loading...</div>
        </div>
        <div class="info-row">
            <div class="label">Viewport:</div>
            <div class="value" id="viewport">Loading...</div>
        </div>
        <div class="info-row">
            <div class="label">IP Address:</div>
            <div class="value" id="ip-address">Loading...</div>
        </div>
        <div class="info-row">
            <div class="label">IPv6 Address:</div>
            <div class="value" id="ipv6-address">Loading...</div>
        </div>
        <div class="info-row">
            <div class="label">Current Time:</div>
            <div class="value" id="current-time">Loading...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
