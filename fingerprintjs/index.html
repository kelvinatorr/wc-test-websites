<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>FingerprintJS Demo</title>
  <style>
    body {
      background: #282c34; color: #e1e5ea;
      padding: 1em; margin: 0; font-family: sans-serif;
      box-sizing: border-box;
    }
    button {
      border: none; background: #f04405; color: #fff; font: inherit;
      font-size: 88%; font-weight: 600; line-height: 1.2; border-radius: 0.57em;
      cursor: pointer; padding: 0.85em 1.7em; outline: none; transition: all 0.25s ease-out;
      margin-bottom: 0.8em; width: 100%; max-width: 300px;
    }
    button:hover { background: #8c2703; }
    button:active { background: #cd3f10; }
    button:disabled { cursor: not-allowed; background: #e9987c; }
    #output pre {
      padding: 0; margin: 0; font-size: 14px; font-family: monospace;
      white-space: pre-wrap; word-break: break-all;
    }
  </style>
</head>
<body>
  <div>
    <button disabled id="debugCopy">Copy Debug Data</button>
  </div>
  <section id="output">
    <pre>Getting the visitor identifier...</pre>
  </section>

  <script src="fp.min.js"></script>
  <script>
    async function startPlayground() {
      const output = document.getElementById('output');
      const startTime = Date.now();

      try {
        const fp = await FingerprintJS.load({ debug: true });
        const result = await fp.get();

        const combinedData = {};
        combinedData["visitorId"] = result.visitorId;
        combinedData["confidence"] = result.confidence.score;
        combinedData["totalTime"] = Date.now() - startTime;
        combinedData["userAgent"] = navigator.userAgent;
        Object.assign(combinedData, structuredClone(result.components));

        output.innerHTML = '';
        const pre = document.createElement('pre');
        pre.textContent = JSON.stringify(combinedData, null, 2);
        output.appendChild(pre);

        const debugText = JSON.stringify(combinedData, null, 2);
        const copyBtn = document.getElementById('debugCopy');
        copyBtn.disabled = false;
        copyBtn.addEventListener('click', function () {
          navigator.clipboard.writeText(debugText).catch(function () {});
        });

      } catch (error) {
        const totalTime = Date.now() - startTime;
        output.innerHTML = '';
        const pre = document.createElement('pre');
        pre.textContent = JSON.stringify({ error: error, timeMsBeforeError: totalTime, userAgent: navigator.userAgent }, null, 2);
        output.appendChild(pre);
      }
    }

    startPlayground();
  </script>
</body>
</html>
